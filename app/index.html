<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConciergePay App</title>
    <style>
        /* DESIGN SYSTEM APP */
        :root { --bg: #000; --surface: #1C1C1E; --text: #fff; --gold: #D4AF37; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); }
        .avatar { width: 35px; height: 35px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        
        /* SCROLL AREA */
        .content { flex: 1; overflow-y: auto; padding: 0 20px; }
        
        /* AI CARD */
        .ai-card { background: linear-gradient(135deg, #2c2c2e, #1c1c1e); border: 1px solid #333; border-radius: 16px; padding: 20px; margin-bottom: 25px; position: relative; }
        .ai-badge { font-size: 10px; color: var(--gold); background: rgba(212, 175, 55, 0.15); padding: 4px 8px; border-radius: 6px; font-weight: 700; display: inline-block; margin-bottom: 8px; }
        
        /* ICONS */
        .icons { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .icon-box { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 60px; cursor: pointer; }
        .circle { width: 55px; height: 55px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .circle img { width: 28px; height: 28px; object-fit: contain; }
        
        /* BILLS */
        .bill { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .bill-left { display: flex; gap: 10px; align-items: center; }
        .bill img { width: 36px; height: 36px; background: #fff; border-radius: 8px; padding: 2px; }

        /* NAV */
        .nav { height: 65px; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; background: #000; }
        .nav span { font-size: 22px; opacity: 0.5; cursor: pointer; }
        .nav span.active { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="font-size: 12px; color: #888;">DZIEŃ DOBRY</div>
            <div style="font-size: 20px; font-weight: 700;">Alex 👋</div>
        </div>
        <div class="avatar">AK</div>
    </div>

    <div class="content">
        <div class="ai-card" onclick="alert('🤖 AI: Przeanalizowałem Twoje umowy. Możesz zaoszczędzić 450 PLN rocznie na zmianie taryfy.')">
            <div class="ai-badge">✨ CONCIERGE AI</div>
            <div style="font-size: 13px; color: #ccc; margin-bottom: 4px;">Znalazłem tańszy prąd.</div>
            <div style="font-size: 22px; font-weight: 700; color: var(--gold);">+450 PLN / rok</div>
        </div>

        <h3 style="font-size: 15px; margin-bottom: 15px;">Twoje usługi</h3>
        <div class="icons">
            <div class="icon-box" onclick="alert('📸 Skaner uruchomiony...')">
                <div class="circle" style="border: 1px dashed var(--gold); color: var(--gold); font-size: 24px;">+</div>
                <span style="font-size: 10px; color: #888;">Dodaj</span>
            </div>
            <div class="icon-box">
                <div class="circle"><img src="../assets/play.png" onerror="this.src='https://via.placeholder.com/30?text=P'"></div>
                <span style="font-size: 10px; color: #888;">Play</span>
            </div>
            <div class="icon-box">
                <div class="circle"><img src="../assets/eonlogo.png" onerror="this.src='https://via.placeholder.com/30?text=E'"></div>
                <span style="font-size: 10px; color: #888;">E.ON</span>
            </div>
        </div>

        <h3 style="font-size: 15px; margin: 20px 0 10px;">Do zapłaty</h3>
        <div class="bill">
            <div class="bill-left">
                <img src="../assets/play.png" onerror="this.src='https://via.placeholder.com/30'">
                <div><div style="font-weight: 600; font-size: 14px;">Play</div><div style="font-size: 11px; color: #666;">Internet</div></div>
            </div>
            <div style="font-weight: 700;">55,00 zł</div>
        </div>
        <div class="bill">
            <div class="bill-left">
                <img src="../assets/eonlogo.png" onerror="this.src='https://via.placeholder.com/30'">
                <div><div style="font-weight: 600; font-size: 14px;">E.ON</div><div style="font-size: 11px; color: #666;">Energia</div></div>
            </div>
            <div style="font-weight: 700;">79,84 zł</div>
        </div>
    </div>

    <div class="nav">
        <span class="active">🏠</span>
        <span>📊</span>
        <span>👤</span>
    </div>

</body>
</html>

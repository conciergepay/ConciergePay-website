<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConciergePay Auto-Demo</title>
    <style>
        /* --- SYSTEM --- */
        :root { --bg: #000000; --surface: #121212; --text: #FFFFFF; --gold: #D4AF37; --success: #34C759; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; user-select: none; position: relative; }
        
        /* GHOST CURSOR (WIDZIALNY KURSOR) */
        .cursor {
            position: fixed; top: 50%; left: 50%; width: 20px; height: 20px;
            background: rgba(255, 255, 255, 0.8); border: 2px solid #fff; border-radius: 50%;
            pointer-events: none; z-index: 9999; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 15px rgba(255,255,255,0.5); display: block;
        }
        .cursor.click { transform: scale(0.8); background: var(--gold); }

        /* SCREENS */
        .screen { position: absolute; top:0; left:0; width:100%; height:100%; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; background: var(--bg); }
        .screen.active { display: flex; animation: fade 0.5s; }
        @keyframes fade { from { opacity:0; } to { opacity:1; } }

        /* ELEMENTS */
        .btn { width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 12px; font-weight: 700; font-size: 16px; margin-top: 20px; color: #000; transition: 0.2s; }
        .btn.pressed { transform: scale(0.95); opacity: 0.8; }
        
        .input { width: 100%; padding: 16px; background: #222; border: 1px solid #333; border-radius: 12px; color: white; margin-bottom: 10px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .input.focus { border-color: var(--gold); background: #2a2a2a; }

        .ai-card { background: linear-gradient(135deg, #1f1f1f, #121212); border: 1px solid #333; border-radius: 16px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
        .ai-card.active { border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; transition: 0.3s; }
        .list-item.new { animation: slideIn 0.5s; background: rgba(52, 199, 89, 0.15); border-radius: 8px; padding: 10px; border-bottom: none; margin-bottom: 5px; }
        .list-item.paid { opacity: 0.5; }
        .list-item.paid .amount { text-decoration: line-through; }
        
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* NAV */
        .nav { height: 70px; background: rgba(18,18,18,0.95); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; }
        .nav-item { opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--gold); transform: translateY(-3px); }

        /* CHART */
        .chart-placeholder { height: 120px; display: flex; align-items: flex-end; gap: 6px; padding-top: 20px; }
        .bar { flex: 1; background: #333; border-radius: 4px 4px 0 0; transition: 0.5s; }
        .bar.active { background: var(--gold); height: 80% !important; }

        /* TOAST */
        .toast { position: absolute; top: 50px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 200; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div class="toast" id="toast">🤖 AI Action</div>

    <div id="screen-login" class="screen active" style="justify-content: center; align-items: center;">
        <img src="../assets/conciergepaylogo.png" width="80" style="margin-bottom:20px; opacity:0.8;" onerror="this.style.display='none'">
        <h2 style="margin-bottom: 5px;">Witaj ponownie</h2>
        <p style="color:#666; font-size:13px; margin-bottom:30px;">Zaloguj się do ConciergePay</p>
        <input type="text" class="input" id="inp-email" placeholder="Email" readonly>
        <input type="password" class="input" id="inp-pass" placeholder="Hasło" readonly>
        <button class="btn" id="btn-login">Zaloguj się</button>
    </div>

    <div id="screen-dashboard" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div><div style="font-size:12px; color:#888;">DZIEŃ DOBRY</div><div style="font-size:20px; font-weight:700;">Alex 👋</div></div>
            <div style="width:32px; height:32px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#000; font-weight:700; font-size:12px;">AK</div>
        </div>

        <div class="ai-card" id="ai-card">
            <div style="font-size:10px; color:var(--gold); font-weight:800; margin-bottom:5px;">✨ AI INSIGHT</div>
            <div id="ai-text" style="font-size:13px; color:#ccc;">Analizuję wydatki...</div>
            <div id="ai-value" style="font-size:22px; font-weight:700; color:var(--gold); margin-top:5px;">...</div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div id="btn-scan" style="flex:1; background:#1c1c1e; padding:15px; border-radius:12px; text-align:center; border:1px solid #333;">
                <span style="font-size:20px; color:var(--gold); display:block;">+</span>
                <span style="font-size:10px;">Skanuj</span>
            </div>
            <div style="flex:1; background:#1c1c1e; padding:15px; border-radius:12px; text-align:center; border:1px solid #333;">
                <span style="font-size:20px; display:block;">⚡</span>
                <span style="font-size:10px;">Integracje</span>
            </div>
        </div>

        <div style="background:#1c1c1e; padding:15px; border-radius:16px; margin-bottom:20px;">
            <div style="font-size:12px; color:#888;">Wydatki</div>
            <div class="chart-placeholder">
                <div class="bar" style="height:30%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:40%"></div>
                <div class="bar" id="bar-active" style="height:60%"></div>
                <div class="bar" style="height:45%"></div><div class="bar" style="height:70%"></div>
            </div>
        </div>

        <div style="font-size:12px; color:#666; margin-bottom:10px;">DO ZAPŁATY</div>
        <div id="list">
            <div class="list-item">
                <div style="display:flex; gap:10px; align-items:center;">
                    <div style="width:36px; height:36px; background:#fff; border-radius:8px; display:flex; align-items:center; justify-content:center;"><img src="../assets/play.png" width="20" onerror="this.style.display='none'"></div>
                    <div><div style="font-weight:600; font-size:14px;">Play</div><div style="font-size:11px; color:#666;">Internet</div></div>
                </div>
                <div class="amount" style="font-weight:700; font-size:14px;">-55,00 zł</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active">🏠</div><div class="nav-item">📊</div><div class="nav-item">👤</div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        
        function moveCursor(targetId, offsetX=0, offsetY=0) {
            const el = document.getElementById(targetId);
            if(!el) return;
            const rect = el.getBoundingClientRect();
            // Przesuwamy kursor na środek elementu
            cursor.style.top = (rect.top + rect.height/2 + offsetY) + "px";
            cursor.style.left = (rect.left + rect.width/2 + offsetX) + "px";
        }

        function clickCursor() {
            cursor.classList.add('click');
            setTimeout(() => cursor.classList.remove('click'), 200);
        }

        function type(id, text) {
            document.getElementById(id).classList.add('focus');
            document.getElementById(id).value = text;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        async function runDemo() {
            while(true) {
                // RESET
                document.getElementById('screen-dashboard').classList.remove('active');
                document.getElementById('screen-login').classList.add('active');
                document.getElementById('inp-email').value = "";
                document.getElementById('inp-pass').value = "";
                document.getElementById('list').innerHTML = `
                    <div class="list-item"><div style="display:flex; gap:10px; align-items:center;"><div style="width:36px; height:36px; background:#fff; border-radius:8px; display:flex; align-items:center; justify-content:center;"><img src="../assets/play.png" width="20" onerror="this.style.display='none'"></div><div><div style="font-weight:600; font-size:14px;">Play</div><div style="font-size:11px; color:#666;">Internet</div></div></div><div class="amount" style="font-weight:700; font-size:14px;">-55,00 zł</div></div>
                `;
                
                await new Promise(r => setTimeout(r, 1000));

                // 1. WPISZ EMAIL
                moveCursor('inp-email');
                await new Promise(r => setTimeout(r, 800));
                type('inp-email', 'alex@concierge.com');
                await new Promise(r => setTimeout(r, 600));

                // 2. KLIKNIJ LOGIN
                moveCursor('btn-login');
                await new Promise(r => setTimeout(r, 800));
                clickCursor();
                document.getElementById('btn-login').classList.add('pressed');
                showToast("🔓 Weryfikacja FaceID...");
                await new Promise(r => setTimeout(r, 1000));

                // 3. PRZEJŚCIE
                document.getElementById('screen-login').classList.remove('active');
                document.getElementById('screen-dashboard').classList.add('active');
                
                // 4. AI ANALIZA
                moveCursor('ai-card');
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('ai-card').classList.add('active');
                document.getElementById('ai-text').innerText = "Znaleziono tańszy prąd (E.ON)";
                document.getElementById('ai-value').innerText = "+450 PLN / rok";
                clickCursor();
                showToast("💰 Znaleziono oszczędności!");
                await new Promise(r => setTimeout(r, 2000));

                // 5. DODAJ RACHUNEK
                moveCursor('btn-scan');
                await new Promise(r => setTimeout(r, 1000));
                clickCursor();
                showToast("📸 Skanowanie faktury...");
                await new Promise(r => setTimeout(r, 1500));
                
                // Dodaj nowy element
                const list = document.getElementById('list');
                const newItem = document.createElement('div');
                newItem.className = 'list-item new';
                newItem.innerHTML = `<div style="display:flex; gap:10px; align-items:center;"><div style="width:36px; height:36px; background:#ff7900; color:white; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700;">O</div><div><div style="font-weight:600; font-size:14px;">Orange</div><div style="font-size:11px; color:#666;">Nowa faktura</div></div></div><div class="amount" style="font-weight:700; font-size:14px;">-49,99 zł</div>`;
                list.prepend(newItem);
                
                // 6. OPŁAĆ
                moveCursor('list', 0, -40); // Troszkę wyżej na nowy element
                await new Promise(r => setTimeout(r, 1000));
                clickCursor();
                newItem.classList.add('paid');
                showToast("💸 Opłacono pomyślnie!");
                document.getElementById('bar-active').classList.add('active');
                
                await new Promise(r => setTimeout(r, 3000));
                // RESTART
            }
        }

        // Startujemy po załadowaniu
        setTimeout(runDemo, 500);

    </script>
</body>
</html>

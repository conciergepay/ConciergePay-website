<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConciergePay App Demo</title>
    <style>
        /* --- SYSTEM APP PREMIUM --- */
        :root { --bg: #000000; --surface: #121212; --text: #FFFFFF; --text-sub: #999; --gold: #D4AF37; --success: #34C759; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen-container { flex: 1; position: relative; overflow: hidden; }
        .screen { display: none; padding: 20px; height: 100%; overflow-y: auto; box-sizing: border-box; padding-bottom: 80px; }
        .screen.active { display: block; animation: fade 0.3s; }
        @keyframes fade { from { opacity:0; } to { opacity:1; } }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .avatar { width:32px; height:32px; background:var(--gold); border-radius:50%; color:#000; font-weight:700; display:flex; align-items:center; justify-content:center; font-size:12px; }
        
        /* CARDS */
        .card { background: var(--surface); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .chart-placeholder { height: 120px; display: flex; align-items: flex-end; gap: 6px; padding-top: 20px; }
        .bar { flex: 1; background: #333; border-radius: 4px 4px 0 0; transition: 0.3s; }
        .bar.active { background: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }

        /* LISTS */
        h3 { font-size: 14px; color: var(--text-sub); margin: 25px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        .item-icon { width: 36px; height: 36px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        
        /* NAV */
        .nav { height: 70px; background: rgba(18,18,18,0.95); backdrop-filter: blur(10px); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; }
        .nav-item { opacity: 0.4; cursor: pointer; transition: 0.2s; text-align: center; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        .nav-label { font-size: 10px; display: block; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="screen-container">
        <div id="screen-stats" class="screen active">
            <div class="header">
                <h2>Twoje Finanse</h2>
                <div class="avatar">AK</div>
            </div>
            
            <div class="card">
                <div style="font-size:12px; color:var(--text-sub);">Wydatki w tym miesiącu</div>
                <div style="font-size:28px; font-weight:700; margin: 5px 0;">1 450,00 PLN</div>
                <div class="chart-placeholder">
                    <div class="bar" style="height: 40%;"></div>
                    <div class="bar" style="height: 60%;"></div>
                    <div class="bar" style="height: 30%;"></div>
                    <div class="bar" style="height: 80%;"></div>
                    <div class="bar active" style="height: 100%;"></div>
                    <div class="bar" style="height: 50%;"></div>
                    <div class="bar" style="height: 70%;"></div>
                </div>
            </div>

            <h3>Ostatnie Transakcje</h3>
            <div class="list-item">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div class="item-icon" style="background:#e9f5ff; color:#007aff;">🛒</div>
                    <div><div>Żabka</div><div style="font-size:12px; color:#666;">Zakupy</div></div>
                </div>
                <div style="font-weight:600;">-45,20 zł</div>
            </div>
            <div class="list-item">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div class="item-icon" style="background:#fff5e9; color:#ff9500;">⚡</div>
                    <div><div>E.ON Polska</div><div style="font-size:12px; color:#666;">Rachunki</div></div>
                </div>
                <div style="font-weight:600;">-120,00 zł</div>
            </div>
        </div>

        <div id="screen-profile" class="screen">
            <div style="text-align:center; margin:30px 0;">
                <div class="avatar" style="width:80px; height:80px; font-size:24px; margin:0 auto 15px;">AK</div>
                <h2>Alex Kowalski</h2>
                <div style="color:var(--gold); font-size:12px; margin-top:5px;">⭐ Konto Premium</div>
            </div>
            
            <h3>Ustawienia</h3>
            <div class="list-item">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div class="item-icon">💳</div>
                    <div>Karty płatnicze</div>
                </div>
                <div style="color:#666;">Visa •••• 4242</div>
            </div>
            <div class="list-item">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div class="item-icon">🔔</div>
                    <div>Powiadomienia</div>
                </div>
                <div style="color:var(--success);">Włączone</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('screen-stats', this)">
            <span style="font-size:20px;">📊</span><span class="nav-label">Analizy</span>
        </div>
        <div class="nav-item" onclick="switchTab('screen-profile', this)">
            <span style="font-size:20px;">👤</span><span class="nav-label">Profil</span>
        </div>
    </div>

    <script>
        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>

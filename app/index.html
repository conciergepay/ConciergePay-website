<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConciergePay App</title>
    <style>
        /* --- DESIGN SYSTEM APP (DARK PREMIUM) --- */
        :root { --bg: #000000; --surface: #141414; --surface-light: #1F1F1F; --text: #FFFFFF; --text-sub: #999999; --gold: #D4AF37; --success: #34C759; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; height: 100vh; -webkit-font-smoothing: antialiased; }
        
        /* LAYOUT & SCREENS */
        .screen-container { flex: 1; position: relative; overflow: hidden; }
        .screen { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; background: var(--bg); transition: opacity 0.3s ease, transform 0.3s ease; opacity: 0; pointer-events: none; transform: scale(0.98); }
        .screen.active { opacity: 1; pointer-events: all; transform: scale(1); z-index: 10; }
        .content { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; } .content::-webkit-scrollbar { display: none; }

        /* HEADER */
        .header { padding: 20px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold), #a68a30); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #000; }
        
        /* AI CARD (HERO) */
        .ai-card { background: linear-gradient(135deg, var(--surface-light) 0%, var(--surface) 100%); border: 1px solid #333; border-radius: 20px; padding: 24px; margin-bottom: 30px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer; }
        .ai-card::after { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 60%); opacity: 0.5; pointer-events: none; }
        .ai-badge { font-size: 10px; color: var(--gold); background: rgba(212, 175, 55, 0.15); padding: 5px 10px; border-radius: 20px; font-weight: 800; display: inline-block; margin-bottom: 12px; letter-spacing: 1px; }

        /* SECTIONS & ICONS */
        h3 { font-size: 16px; margin-bottom: 15px; font-weight: 600; color: var(--text); }
        .icons { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; margin: 0 -20px; padding-left: 20px; }
        .icon-box { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 68px; cursor: pointer; }
        .circle { width: 60px; height: 60px; background: var(--surface); border-radius: 24px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; transition: 0.2s; }
        .circle:active { transform: scale(0.95); border-color: var(--gold); }
        .circle img { width: 30px; height: 30px; object-fit: contain; }

        /* BILLS LIST */
        .bill { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 16px; border-radius: 18px; margin-bottom: 12px; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
        .bill:active { background: var(--surface-light); }
        .bill-left { display: flex; gap: 14px; align-items: center; }
        .bill img { width: 42px; height: 42px; background: #fff; border-radius: 12px; padding: 4px; }
        .status-paid { font-size: 11px; color: var(--success); background: rgba(52, 199, 89, 0.1); padding: 4px 10px; border-radius: 12px; font-weight: 600; display: none; }

        /* NAV BAR (BOTTOM) */
        .nav { height: 80px; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: flex-start; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); padding-top: 15px; position: fixed; bottom: 0; width: 100%; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.4; transition: 0.2s; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        .nav-icon { font-size: 22px; }
        .nav-label { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="screen-container">
        <div id="screen-home" class="screen active">
            <div class="header">
                <div><div style="font-size: 12px; color: var(--text-sub); margin-bottom: 4px;">DZIEŃ DOBRY</div><div style="font-size: 24px; font-weight: 700;">Alex 👋</div></div>
                <div class="avatar">AK</div>
            </div>
            <div class="content">
                <div class="ai-card" onclick="alert('🤖 AI: Szczegóły analizy... (Symulacja)')">
                    <div class="ai-badge">✨ CONCIERGE AI</div>
                    <div style="font-size: 14px; color: var(--text-sub); margin-bottom: 4px;">Znalazłem tańszy prąd.</div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--gold);">+450 PLN / rok</div>
                </div>
                <h3>Twoje usługi</h3>
                <div class="icons">
                    <div class="icon-box" onclick="simulateScan()">
                        <div class="circle" style="border: 1px dashed var(--gold); color: var(--gold); font-size: 24px;">+</div><span style="font-size: 11px; color: var(--text-sub);">Dodaj</span>
                    </div>
                    <div class="icon-box"><div class="circle"><img src="../assets/play.png" onerror="this.src='https://via.placeholder.com/30'"></div><span style="font-size: 11px; color: var(--text-sub);">Play</span></div>
                    <div class="icon-box"><div class="circle"><img src="../assets/eonlogo.png" onerror="this.src='https://via.placeholder.com/30'"></div><span style="font-size: 11px; color: var(--text-sub);">E.ON</span></div>
                </div>
                <h3 style="margin: 25px 0 15px;">Do zapłaty</h3>
                <div class="bill" onclick="payBill(this, '55,00 zł')">
                    <div class="bill-left"><img src="../assets/play.png" onerror="this.src='https://via.placeholder.com/40'"><div><div style="font-weight: 600; font-size: 15px;">Play</div><div style="font-size: 12px; color: var(--text-sub);">Internet</div></div></div>
                    <div class="bill-right"><div class="price" style="font-weight: 700;">55,00 zł</div><div class="status-paid">Opłacono ✅</div></div>
                </div>
                <div class="bill" onclick="payBill(this, '79,84 zł')">
                    <div class="bill-left"><img src="../assets/eonlogo.png" onerror="this.src='https://via.placeholder.com/40'"><div><div style="font-weight: 600; font-size: 15px;">E.ON</div><div style="font-size: 12px; color: var(--text-sub);">Energia</div></div></div>
                    <div class="bill-right"><div class="price" style="font-weight: 700;">79,84 zł</div><div class="status-paid">Opłacono ✅</div></div>
                </div>
            </div>
        </div>

        <div id="screen-stats" class="screen">
            <div class="header"><h2>Statystyki</h2></div>
            <div class="content" style="display:flex; justify-content:center; align-items:center; color:#333;">(Wkrótce)</div>
        </div>

        <div id="screen-profile" class="screen">
            <div class="header"><h2>Profil</h2></div>
            <div class="content" style="display:flex; justify-content:center; align-items:center; color:#333;">(Wkrótce)</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('screen-home', this)"><span class="nav-icon">🏠</span><span class="nav-label">Start</span></div>
        <div class="nav-item" onclick="switchTab('screen-stats', this)"><span class="nav-icon">📊</span><span class="nav-label">Analizy</span></div>
        <div class="nav-item" onclick="switchTab('screen-profile', this)"><span class="nav-icon">👤</span><span class="nav-label">Profil</span></div>
    </div>

    <script>
        // 1. NAWIGACJA (Zmiana zakładek)
        function switchTab(screenId, navItem) {
            // Schowaj wszystkie ekrany
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // Pokaż wybrany
            document.getElementById(screenId).classList.add('active');
            // Zaktualizuj aktywny przycisk w menu
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navItem.classList.add('active');
        }

        // 2. SYMULACJA PŁATNOŚCI
        function payBill(element, amount) {
            const priceDiv = element.querySelector('.price');
            const statusDiv = element.querySelector('.status-paid');
            
            if (priceDiv.style.display !== 'none') {
                if(confirm("Zapłacić " + amount + " teraz?")) {
                    priceDiv.style.display = 'none';
                    statusDiv.style.display = 'inline-block';
                    element.style.borderColor = 'var(--success)';
                }
            }
        }

        // 3. SYMULACJA SKANERA
        function simulateScan() {
            alert("📸 Otwieram aparat... (Symulacja skanowania faktury)");
        }
    </script>
</body>
</html>

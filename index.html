<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConciergePay | Finanse na Autopilocie</title>
    <style>
        /* --- TOP TIER DESIGN SYSTEM --- */
        :root {
            --bg: #050505; --text: #FFFFFF; --text-sub: #A1A1A6;
            --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.3);
            --glass: rgba(20, 20, 20, 0.6); --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* VIDEO BACKGROUND */
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; mix-blend-mode: lighten; filter: saturate(0); }
        .hero-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.2) 0%, var(--bg) 90%); z-index: 0; }

        /* TYPOGRAPHY & ANIMATIONS */
        h1 { font-size: 4.5rem; line-height: 1.05; font-weight: 800; letter-spacing: -2px; margin-bottom: 24px; }
        p { font-size: 1.25rem; color: var(--text-sub); line-height: 1.6; max-width: 520px; margin-bottom: 40px; }
        .gradient-text { background: linear-gradient(135deg, #fff 30%, var(--text-sub) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .fade-up { opacity: 0; transform: translateY(30px); animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .delay-1 { animation-delay: 0.2s; } .delay-2 { animation-delay: 0.4s; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* UI ELEMENTS */
        .nav { padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; position: absolute; width: 100%; z-index: 100; }
        .logo { font-weight: 700; font-size: 1.3rem; color: white; text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .btn { padding: 16px 36px; border-radius: 40px; font-weight: 600; text-decoration: none; transition: 0.3s; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--gold); color: #000; box-shadow: 0 10px 30px var(--gold-glow); }
        .btn-primary:hover { transform: scale(1.03); box-shadow: 0 20px 50px var(--gold-glow); }

        /* HERO SECTION */
        .hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding: 100px 0; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
        .hero-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 80px; align-items: center; position: relative; z-index: 2; }

        /* PHONE FRAME */
        .phone-frame { 
            position: relative; width: 360px; height: 720px; margin: 0 auto;
            border: 14px solid #121212; border-radius: 60px; background: #000;
            box-shadow: 0 0 0 2px #2a2a2a, 0 40px 80px rgba(0,0,0,0.6);
            transform: rotate(-2deg); transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .phone-frame:hover { transform: rotate(0deg) scale(1.02); }
        .app-iframe { width: 100%; height: 100%; border: none; border-radius: 46px; background: #000; }

        /* WAITLIST FORM */
        .form-glass { display: flex; gap: 10px; background: var(--glass); padding: 8px; border-radius: 50px; border: 1px solid var(--border); backdrop-filter: blur(20px); max-width: 480px; }
        .input-email { flex: 1; background: transparent; border: none; padding: 0 24px; color: white; outline: none; font-size: 1rem; }

        @media (max-width: 1024px) {
            .hero-grid { grid-template-columns: 1fr; text-align: center; }
            .phone-frame { margin-top: 60px; transform: rotate(0); height: 650px; }
            h1 { font-size: 3.5rem; } .form-glass { margin: 0 auto; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="https://player.vimeo.com/external/457678390.sd.mp4?s=a6052488257f281755902c215c60036469596535&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <nav class="nav fade-up">
        <a href="#" class="logo"><img src="assets/conciergepaylogo.png" height="32"> ConciergePay</a>
        <a href="#waitlist" class="btn btn-primary" style="padding: 12px 24px; font-size: 0.9rem;">Dostęp Beta</a>
    </nav>

    <section class="hero">
        <div class="container hero-grid">
            <div class="hero-content">
                <div class="fade-up" style="color: var(--gold); font-weight: 700; margin-bottom: 20px; letter-spacing: 2px; font-size: 13px; display: flex; align-items: center; gap: 10px;">
                    <span style="display:block; width:8px; height:8px; background:var(--gold); border-radius:50%; box-shadow: 0 0 10px var(--gold);"></span> LIVE DEMO
                </div>
                <h1 class="fade-up delay-1">Twoje finanse <br><span class="gradient-text">na autopilocie.</span></h1>
                <p class="fade-up delay-2">Przestań tracić czas na logowanie do 10 portali. Nasze AI analizuje umowy, znajduje oszczędności i opłaca rachunki jednym kliknięciem.</p>
                
                <div class="fade-up delay-2" style="margin-bottom: 30px;">
                    <form action="https://formsubmit.co/WPISZ_TU_SWOJ_EMAIL" method="POST" class="form-glass">
                        <input type="email" name="email" placeholder="Wpisz swój email..." required class="input-email">
                        <button type="submit" class="btn btn-primary">Dołącz</button>
                    </form>
                </div>
            </div>

            <div class="phone-frame fade-up delay-1">
                <iframe src="app/index.html" class="app-iframe" title="App Demo"></iframe>
            </div>
        </div>
    </section>

</body>
</html>
